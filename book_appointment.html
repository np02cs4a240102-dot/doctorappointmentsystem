<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Appointment</title>
  <link rel="stylesheet" href="styleofpatient.css" />
</head>
<body>
  <div class="navbar">
    <h2>MediCare Connect</h2>
    <div>
      <a href="find_doctor.html">Find Doctor</a>
      <a href="patient_login.html">Logout</a>
    </div>
  </div>

  <div class="page-container">
    <div class="booking-card">
      <h2>Book Appointment</h2>
      <div id="bookSuccess" class="alert success">Appointment booked successfully!</div>

      <form id="bookingForm">
        <label>Select Doctor</label>
        <select id="doctorSelect" required>
          <option value="">Choose Doctor</option>
          <option>Dr. John Smith - Cardiologist</option>
          <option>Dr. Sarah Lee - Dermatologist</option>
          <option>Dr. David Kim - Dentist</option>
          <option>Dr. Emily Clark - Pediatrician</option>
        </select>

        <label>Select Date</label>
        <input type="date" id="date" required />

        <label>Select Time Slot</label>
        <select required>
          <option value="">Choose Time Slot</option>
          <option>10:00 AM</option>
          <option>11:00 AM</option>
          <option>12:00 PM</option>
          <option>2:00 PM</option>
          <option>4:00 PM</option>
        </select>

        <label>Reason / Symptoms</label>
        <textarea rows="4" placeholder="Describe your symptoms..." required></textarea>

        <button type="submit">Confirm Appointment</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('date').min = new Date().toISOString().split('T')[0];

    const params = new URLSearchParams(window.location.search);
    const doctorName = params.get('doctor');
    if (doctorName) {
      const select = document.getElementById('doctorSelect');
      for (let opt of select.options) {
        if (opt.text.includes(doctorName)) {
          opt.selected = true;
          break;
        }
      }
    }

    document.getElementById("bookingForm").addEventListener("submit", function(e) {
      e.preventDefault();
      document.getElementById('bookSuccess').style.display = 'block';
      this.reset();
      setTimeout(() => {
        window.location.href = "find_doctor.html";
      }, 2000);
    });
  </script>
</body>
</html>
