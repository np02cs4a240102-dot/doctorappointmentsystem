<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Registration — MediCare Connect</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#e6f0fa 0%,#d0e2f0 100%);min-height:100vh;}
    fieldset{border:2px solid #cde3f0;border-radius:20px;padding:24px 28px;background:white;box-shadow:0 8px 20px rgba(0,0,0,0.05);margin-bottom:24px;}
    legend{background:#1a3c5c;color:white;padding:8px 22px;border-radius:40px;font-weight:bold;font-size:1.05rem;}
    input[type="text"],input[type="email"],input[type="tel"],input[type="time"],input[type="password"],select{padding:10px 15px;border:2px solid #d4e4ef;border-radius:25px;font-size:0.95rem;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;width:100%;transition:all 0.3s ease;background:white;color:#1a3c5c;}
    input:focus,select:focus{outline:none;border-color:#2c7da0;box-shadow:0 0 0 3px rgba(44,125,160,0.12);}
    label{display:block;font-weight:600;color:#1a3c5c;margin-bottom:6px;font-size:0.9rem;}
    .form-group{margin-bottom:16px;}
    button{background:#2c7da0;color:white;border:none;padding:10px 26px;border-radius:40px;font-size:0.92rem;font-weight:600;cursor:pointer;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;transition:all 0.3s ease;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
    button:hover{background:#1a5a7a;transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,0,0,0.12);}
    .btn-secondary{background:#7f8c8d;} .btn-secondary:hover{background:#5d6d7e;}
    .auth-center{display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:40px 20px;}
    .alert{padding:12px 18px;border-radius:12px;font-size:0.9rem;font-weight:600;margin-bottom:16px;display:none;}
    .alert-error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;}
    .alert-success{background:#d4edda;color:#155724;border:1px solid #c3e6cb;}
    .day-checkboxes{display:flex;flex-wrap:wrap;gap:12px;margin:10px 0 16px;}
    .day-checkboxes label{display:flex;align-items:center;gap:6px;font-weight:500;color:#1a3c5c;cursor:pointer;margin-bottom:0;}
    .day-checkboxes input[type="checkbox"]{width:15px;height:15px;accent-color:#2c7da0;}
    .form-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
    .form-row .form-group{flex:1;min-width:140px;}
    p{color:#2c5a7a;margin-top:6px;}
  </style>
</head>
<body>
  <div class="auth-center">
    <div style="width:100%;max-width:520px;">
      <div style="text-align:center;margin-bottom:20px;">
        <h1 style="color:#1a3c5c;font-size:1.8rem;">🩺 MediCare Connect</h1>
        <p style="color:#2c7da0;margin-top:4px;">Doctor Registration</p>
      </div>
      <fieldset>
        <legend>Doctor Registration</legend>
        <div id="alertBox" class="alert"></div>
        <p style="margin-bottom:16px;font-size:0.9rem;">Please complete your profile to get started.</p>

        <div class="form-group">
          <label for="doc_name">Full Name</label>
          <input type="text" id="doc_name" placeholder="e.g. Dr. Asha Sharma" />
        </div>
        <div class="form-group">
          <label for="doc_email">Email</label>
          <input type="email" id="doc_email" placeholder="Your email address" />
        </div>
        <div class="form-group">
          <label for="doc_spec">Specialization</label>
          <select id="doc_spec">
            <option value="">— Select Specialization —</option>
            <option>Cardiologist</option>
            <option>Dermatologist</option>
            <option>Dentist</option>
            <option>Neurologist</option>
            <option>Pediatrician</option>
            <option>Orthopedic</option>
            <option>Gynecologist</option>
            <option>General Physician</option>
          </select>
        </div>
        <div class="form-group">
          <label for="doc_phone">Phone Number</label>
          <input type="tel" id="doc_phone" placeholder="+977 98XXXXXXXX" />
        </div>
        <div class="form-group">
          <label for="doc_password">Password</label>
          <input type="password" id="doc_password" placeholder="Create a password (min 6 characters)" />
        </div>
        <div class="form-group">
          <label for="doc_confirm">Confirm Password</label>
          <input type="password" id="doc_confirm" placeholder="Repeat your password" />
        </div>
        <div class="form-group">
          <label>Days Available</label>
          <div class="day-checkboxes">
            <label><input type="checkbox" value="Sunday" /> Sunday</label>
            <label><input type="checkbox" value="Monday" /> Monday</label>
            <label><input type="checkbox" value="Tuesday" /> Tuesday</label>
            <label><input type="checkbox" value="Wednesday" /> Wednesday</label>
            <label><input type="checkbox" value="Thursday" /> Thursday</label>
            <label><input type="checkbox" value="Friday" /> Friday</label>
          </div>
        </div>
        <div class="form-group">
          <label>Morning Slot</label>
          <div class="form-row">
            <div class="form-group">
              <label style="font-size:0.8rem;font-weight:500;">From</label>
              <input type="time" id="am_start" value="09:00" />
            </div>
            <div class="form-group">
              <label style="font-size:0.8rem;font-weight:500;">To</label>
              <input type="time" id="am_end" value="11:00" />
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Evening Slot <span style="font-weight:400;font-size:0.8rem;">(optional)</span></label>
          <div class="form-row">
            <div class="form-group">
              <label style="font-size:0.8rem;font-weight:500;">From</label>
              <input type="time" id="pm_start" />
            </div>
            <div class="form-group">
              <label style="font-size:0.8rem;font-weight:500;">To</label>
              <input type="time" id="pm_end" />
            </div>
          </div>
        </div>

        <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;">
          <button onclick="handleRegister()" style="flex:1;">Register</button>
          <button onclick="window.location.href='login_signup.html'" class="btn-secondary" style="flex:1;">Back to Login</button>
        </div>
      </fieldset>
    </div>
  </div>

  <script>
    function showAlert(msg, type) {
      const b = document.getElementById('alertBox');
      b.className = 'alert alert-' + type;
      b.textContent = msg;
      b.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function handleRegister() {
      const name     = document.getElementById('doc_name').value.trim();
      const email    = document.getElementById('doc_email').value.trim();
      const spec     = document.getElementById('doc_spec').value;
      const phone    = document.getElementById('doc_phone').value.trim();
      const password = document.getElementById('doc_password').value;
      const confirm  = document.getElementById('doc_confirm').value;
      const days     = Array.from(document.querySelectorAll('.day-checkboxes input:checked')).map(c => c.value);
      const am_start = document.getElementById('am_start').value;
      const am_end   = document.getElementById('am_end').value;
      const pm_start = document.getElementById('pm_start').value;
      const pm_end   = document.getElementById('pm_end').value;

      // Frontend validation
      if (!name || !email || !spec || !phone || !password || !confirm) {
        showAlert('Please fill in all required fields.', 'error'); return;
      }
      if (password.length < 6) {
        showAlert('Password must be at least 6 characters.', 'error'); return;
      }
      if (password !== confirm) {
        showAlert('Passwords do not match.', 'error'); return;
      }
      if (days.length === 0) {
        showAlert('Please select at least one available day.', 'error'); return;
      }
      if (!am_start || !am_end) {
        showAlert('Please set your morning availability slot.', 'error'); return;
      }

      try {
        const res  = await fetch('api/doctor_register.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, specialization: spec, phone, password, confirm_password: confirm, days, am_start, am_end, pm_start, pm_end })
        });
        const data = await res.json();
        if (data.error) { showAlert(data.message, 'error'); return; }
        showAlert('Registration successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = data.redirect, 1500);
      } catch(e) { showAlert('Server error. Please try again.', 'error'); }
    }
  </script>
</body>
</html>
