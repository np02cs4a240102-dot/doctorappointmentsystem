<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doctor Registration — MediCare Connect</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#e6f0fa 0%,#d0e2f0 100%);min-height:100vh;}
    fieldset{border:2px solid #cde3f0;border-radius:20px;padding:24px 28px;background:white;box-shadow:0 8px 20px rgba(0,0,0,0.05);margin-bottom:24px;}
    legend{background:#1a3c5c;color:white;padding:8px 22px;border-radius:40px;font-weight:bold;font-size:1.05rem;}
    input[type="text"],input[type="email"],input[type="tel"],input[type="time"],input[type="number"],select{padding:10px 15px;border:2px solid #d4e4ef;border-radius:25px;font-size:0.95rem;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;width:100%;transition:all 0.3s ease;background:white;color:#1a3c5c;}
    input:focus,select:focus{outline:none;border-color:#2c7da0;box-shadow:0 0 0 3px rgba(44,125,160,0.12);}
    label{display:block;font-weight:600;color:#1a3c5c;margin-bottom:6px;font-size:0.9rem;}
    .form-group{margin-bottom:16px;}
    button{background:#2c7da0;color:white;border:none;padding:10px 26px;border-radius:40px;font-size:0.92rem;font-weight:600;cursor:pointer;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;transition:all 0.3s ease;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
    button:hover{background:#1a5a7a;transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,0,0,0.12);}
    .btn-secondary{background:#7f8c8d;} .btn-secondary:hover{background:#5d6d7e;}
    .auth-center{display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:40px 20px;}
    .alert{padding:12px 18px;border-radius:12px;font-size:0.9rem;font-weight:600;margin-bottom:16px;display:none;}
    .alert-error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;}
    .alert-success{background:#d4edda;color:#155724;border:1px solid #c3e6cb;}
    .day-checkboxes{display:flex;flex-wrap:wrap;gap:12px;margin:10px 0 16px;}
    .day-checkboxes label{display:flex;align-items:center;gap:6px;font-weight:500;color:#1a3c5c;cursor:pointer;margin-bottom:0;}
    .day-checkboxes input[type="checkbox"]{width:15px;height:15px;accent-color:#2c7da0;}
    .form-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
    .form-row .form-group{flex:1;min-width:140px;}
    p{color:#2c5a7a;margin-top:6px;}
  </style>
</head>
<body>
  <div class="auth-center">
    <div style="width:100%;max-width:520px;">
      <div style="text-align:center;margin-bottom:20px;">
        <h1 style="color:#1a3c5c;font-size:1.8rem;">🩺 MediCare Connect</h1>
        <p style="color:#2c7da0;margin-top:4px;">Complete Your Doctor Profile</p>
      </div>
      <fieldset>
        <legend>Doctor Registration</legend>
        <div id="alertBox" class="alert"></div>
        <p style="margin-bottom:16px;font-size:0.9rem;">Please complete your profile to get started.</p>
        
        <form id="registerForm">
          <div class="form-group">
            <label for="doc_name">Full Name</label>
            <input type="text" id="doc_name" name="name" placeholder="Dr. Asha Sharma" required />
          </div>
          <div class="form-group">
            <label for="doc_email">Email</label>
            <input type="email" id="doc_email" name="email" placeholder="Your email address" required readonly />
          </div>
          <div class="form-group">
            <label for="doc_spec">Specialization</label>
            <select id="doc_spec" name="specialization" required>
              <option value="">— Select Specialization —</option>
              <option>Cardiologist</option>
              <option>Dermatologist</option>
              <option>Dentist</option>
              <option>Neurologist</option>
              <option>Pediatrician</option>
              <option>Orthopedic</option>
              <option>Gynecologist</option>
              <option>General Physician</option>
            </select>
          </div>
          <div class="form-group">
            <label for="doc_phone">Phone Number</label>
            <input type="tel" id="doc_phone" name="phone" placeholder="+977 98XXXXXXXX" required/>
          </div>
          <div class="form-group">
            <label for="doc_experience">Years of Experience</label>
            <input type="number" id="doc_experience" name="experience" min="0" max="50" value="5" />
          </div>
          <div class="form-group">
            <label>Days Available</label>
            <div class="day-checkboxes">
              <label><input type="checkbox" name="days" value="Sun" checked /> Sunday</label>
              <label><input type="checkbox" name="days" value="Mon" checked /> Monday</label>
              <label><input type="checkbox" name="days" value="Tue" checked /> Tuesday</label>
              <label><input type="checkbox" name="days" value="Wed" /> Wednesday</label>
              <label><input type="checkbox" name="days" value="Thu" /> Thursday</label>
              <label><input type="checkbox" name="days" value="Fri" /> Friday</label>
              <label><input type="checkbox" name="days" value="Sat" /> Saturday</label>
            </div>
          </div>
          <div class="form-group">
            <label>Morning Hours</label>
            <div class="form-row">
              <div class="form-group">
                <label style="font-size:0.8rem;font-weight:500;">Start</label>
                <input type="time" id="am_start" name="am_start" value="09:00" />
              </div>
              <div class="form-group">
                <label style="font-size:0.8rem;font-weight:500;">End</label>
                <input type="time" id="am_end" name="am_end" value="11:00" />
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>Evening Hours</label>
            <div class="form-row">
              <div class="form-group">
                <label style="font-size:0.8rem;font-weight:500;">Start</label>
                <input type="time" id="pm_start" name="pm_start" value="14:00" />
              </div>
              <div class="form-group">
                <label style="font-size:0.8rem;font-weight:500;">End</label>
                <input type="time" id="pm_end" name="pm_end" value="16:00" />
              </div>
            </div>
          </div>
          <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;">
            <button type="submit" style="flex:1;">Complete Registration</button>
            <button type="button" onclick="window.location.href='login_signup.html'" class="btn-secondary" style="flex:1;">Back to Login</button>
          </div>
        </form>
      </fieldset>
    </div>
  </div>
  
  <script>
    // Populate email and name from localStorage or URL
    const params = new URLSearchParams(window.location.search);
    const emailParam = params.get('email');
    const storedEmail = localStorage.getItem('doctorEmail');
    const storedName = localStorage.getItem('doctorName');
    const userEmail = localStorage.getItem('userEmail');
    const userName = localStorage.getItem('userName');
    
    const emailField = document.getElementById('doc_email');
    const nameField = document.getElementById('doc_name');
    
    if (storedEmail) emailField.value = storedEmail;
    else if (emailParam) emailField.value = emailParam;
    else if (userEmail) emailField.value = userEmail;
    
    if (storedName) nameField.value = storedName;
    else if (userName) nameField.value = userName;
    
    function showAlert(msg, type) { 
        const b = document.getElementById('alertBox'); 
        b.className = 'alert alert-' + type; 
        b.textContent = msg; 
        b.style.display = 'block'; 
        setTimeout(() => b.style.display = 'none', 5000); 
    }
    
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        const email = formData.get('email');
        const name = formData.get('name');
        const specialization = formData.get('specialization');
        const phone = formData.get('phone');
        const experience = formData.get('experience') || 0;
        
        if (!email) {
            showAlert('Email is required. Please login again.', 'error');
            return;
        }
        
        if (!specialization) {
            showAlert('Please select a specialization.', 'error');
            return;
        }
        
        // Get selected days
        const selectedDays = [];
        document.querySelectorAll('input[name="days"]:checked').forEach(cb => {
            selectedDays.push(cb.value);
        });
        
        if (selectedDays.length === 0) {
            showAlert('Please select at least one day.', 'error');
            return;
        }
        
        const data = {
            email: email,
            name: name,
            specialization: specialization,
            phone: phone,
            experience: parseInt(experience),
            days: selectedDays,
            am_start: formData.get('am_start'),
            am_end: formData.get('am_end'),
            pm_start: formData.get('pm_start'),
            pm_end: formData.get('pm_end')
        };
        
        try {
            const response = await fetch('doctor_backend/process_register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (result.success) {
                localStorage.setItem('doctorId', result.doctor_id);
                localStorage.setItem('doctorName', name);
                showAlert('Registration complete! Redirecting to dashboard...', 'success');
                setTimeout(() => {
                    window.location.href = 'doctor_dashboard.html?registered=success';
                }, 1500);
            } else {
                showAlert(result.error || 'Registration failed', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showAlert('Network error. Please try again.', 'error');
        }
    });
  </script>
</body>
</html>
