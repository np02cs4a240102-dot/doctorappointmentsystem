<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2>Patient Login</h2>
      <p class="subtitle">Access your health appointments and records</p>

      <div id="successMsg" class="alert success">Signup successful! Please login.</div>

      <form id="loginForm">
        <input type="email" placeholder="Enter Email" required />
        <input type="password" placeholder="Enter Password" required />
        <button type="submit">Login</button>
      </form>

      <p>Don't have an account? <a href="patient_signup.html">Sign Up</a></p>
    </div>
  </div>

  <script>
    if (new URLSearchParams(window.location.search).get('signup') === 'success') {
      document.getElementById('successMsg').style.display = 'block';
    }

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      window.location.href = "find_doctor.html";
    });
  </script>
</body>
</html>
